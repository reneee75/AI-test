<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가위바위보 게임</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        /* 버튼 기본 스타일 */
        button {
            font-size: 18px;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 5px 20px 5px; /* 버튼 사이 간격 추가 */
        }

        /* 시작 버튼 색상 (초록) */
        .start-btn {
            background-color: #4CAF50;
        }
        .start-btn:hover {
            background-color: #45a049;
        }

        /* 종료 버튼 색상 (빨강) */
        .stop-btn {
            background-color: #f44336;
        }
        .stop-btn:hover {
            background-color: #da190b;
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #ddd;
            border-radius: 10px;
            width: 200px;
            height: 200px;
            overflow: hidden;
            background-color: #000;
        }

        #result-container {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #fff;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
        }

        .ready-text {
            font-size: 16px;
            color: #666;
            font-weight: normal;
        }

        .game-result {
            font-size: 32px;
            font-weight: bold;
            color: #ff5722;
        }
    </style>
</head>
<body>

    <h1>가위바위보 게임</h1>
    <button type="button" class="start-btn" onclick="init()">게임 시작</button>
    <button type="button" class="stop-btn" onclick="stopGame()">게임 종료</button>
    
    <div id="webcam-container"></div>
    <div id="result-container" class="ready-text">버튼을 눌러 시작하세요</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">

    const URL = "https://teachablemachine.withgoogle.com/models/MpfmEtRfgE/";

    let model, webcam, resultContainer, maxPredictions;
    let predictInterval; // 0.5초 타이머를 제어하기 위한 변수

    async function init() {
        // 이미 게임이 실행 중이라면 중복 실행 방지
        if (predictInterval) return; 

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true; 
        webcam = new tmImage.Webcam(200, 200, flip); 
        await webcam.setup(); 
        await webcam.play();
        
        window.requestAnimationFrame(loop);

        // 웹캠이 새로 켜질 때 화면 비우고 다시 붙이기
        const webcamContainer = document.getElementById("webcam-container");
        webcamContainer.innerHTML = ""; 
        webcamContainer.appendChild(webcam.canvas);
        
        resultContainer = document.getElementById("result-container");
        resultContainer.className = "ready-text";
        resultContainer.innerHTML = "분석 중...";

        // 타이머 ID를 변수에 저장합니다 (나중에 멈추기 위함)
        predictInterval = setInterval(predict, 500);
    }

    async function loop() {
        if (webcam && webcam.canvas) {
            webcam.update(); 
            window.requestAnimationFrame(loop);
        }
    }

    async function predict() {
        if (!model || !webcam) return;

        const prediction = await model.predict(webcam.canvas);
        
        let highestClassName = "";
        let highestProbability = 0;

        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].probability > highestProbability) {
                highestProbability = prediction[i].probability;
                highestClassName = prediction[i].className;
            }
        }

        resultContainer.className = "game-result";
        resultContainer.innerHTML = highestClassName + " (" + Math.round(highestProbability * 100) + "%)";
    }

    // 게임 종료 기능을 수행하는 새로운 함수
    function stopGame() {
        if (predictInterval) {
            clearInterval(predictInterval); // 0.5초 반복 타이머 종료
            predictInterval = null;
        }

        if (webcam) {
            webcam.stop(); // 웹캠 작동 멈춤
        }

        // 화면 요소 초기화
        document.getElementById("webcam-container").innerHTML = "";
        if (resultContainer) {
            resultContainer.className = "ready-text"; // 글자 크기 다시 작게
            resultContainer.innerHTML = "버튼을 눌러 시작하세요";
        }
    }
</script>

</body>
</html>
